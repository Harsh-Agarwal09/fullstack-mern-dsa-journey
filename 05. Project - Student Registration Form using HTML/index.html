<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student_Registration_Form</title>
</head>

<body>
    <header>
        <h1><b>This is a student Registration Form Project using simply HTML.</b></h1>
    </header>
    <hr><br>
    <main>
        <h2><b>Student Registration Form</b></h2>
        <p>Please fill out the form below to register.</p>
        <hr>
        <form action="http://register.com" method="post">
            <fieldset>
                <legend> Personal Information</legend>
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" required><br><br>
                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" required><br><br>
                <label for="date">Date of Birth:</label>
                <input type="date" id="date" name="date" required><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required><br><br>
            </fieldset>
            <hr>

            <fieldset>
                <legend>Address Information</legend>
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" required><br><br>
                <label for="city">City:</label>
                <input type="text" id="city" name="city" required><br><br>
                <label for="state">State:</label>
                <input type="text" id="state" name="state" required><br><br>
                <label for="zip">Zip Code:</label>
                <input type="number" id="zip" name="zip" required><br><br>
            </fieldset>
            <hr>

            <fieldset>
                <legend>Educational Information</legend>
                <label for="school">High School:</label>
                <input type="text" id="school" name="school" required><br><br>
                <label for="grade">GPA:</label>
                <input type="number" id="grade" name="grade" step="0.01" min="0" max="4.0" required><br><br>
                <label for="major">Intended Major:</label>
                <input type="text" id="major" name="major" required><br><br>
                <label for="year">Year of Graduation:</label>
                <input type="number" id="year" name="year" required><br><br>
            </fieldset>
            <hr>

            <fieldset>
                <legend>Additional Information</legend>
                <label for="interests">Interests and Hobbies:</label>
                <input type="text" id="interests" name="interests"><br><br>
                <label for="comments">Additional Comments:</label>
                <textarea id="comments" name="comments"></textarea><br><br>
            </fieldset>
            <hr>
        </form>
        <input type="submit" value="Register">
        <hr>
    </main>
    <footer>
        @ 2026 Student Registration. All right reserved.
    </footer>
</body>

</html>
